version: '3.8'

services:
  # 🚀 Backend Service Configuration (Spring Boot)
  aquarag-backend:
    build: ./backend
    container_name: aquarag-backend
    ports:
      - "9000:9000" # Maps port 9000 of the container to port 9000 on your local machine
    restart: always

  # 🚀 Frontend Service Configuration (Angular)
  aquarag-frontend:
    build: ./frontend
    container_name: aquarag-frontend
    ports:
      - "80:80" # Maps port 80 of the container to port 80 on your local machine (http://localhost)
    restart: always
    depends_on:
      - aquarag-backend # Ensures the backend starts up before the frontend launches