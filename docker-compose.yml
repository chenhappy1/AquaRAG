version: '3.8'

services:
  # 1. Your brand-new Python RAG backend
  backend-python:
    build: ./backend-python    # Points to your new folder
    ports:
      - "8000:8000"            # FastAPI defaults to port 8000
    environment:
      - OPENAI_API_KEY=your_actual_openai_api_key_here  # Enter your API Key here
    volumes:
      - ./backend-python/chroma_db:/app/chroma_db # Keeps your Vector DB data safe when container restarts

  # 2. Your original Java backend (Kept safely here, won't conflict)
  backend-java:
    build: ./backend
    ports:
      - "9000:9000"            # Your original Java port

  # 3. Your Angular frontend
  frontend:
    build: ./frontend
    ports:
      - "4200:4200"